; rclone config template for Cloudflare R2.
; Copy this file to ~/.config/rclone/rclone.conf and fill in your three R2 values.
; DO NOT commit a filled-in version to the repo.

[r2]
type = s3
provider = Cloudflare
access_key_id = REPLACE_ME_R2_ACCESS_KEY_ID
secret_access_key = REPLACE_ME_R2_SECRET_ACCESS_KEY
endpoint = REPLACE_ME_R2_ENDPOINT_URL
acl = private
; R2 API tokens have object read/write but not bucket-creation rights, so rclone
; must not probe CreateBucket (it 403s on large multipart uploads otherwise).
; The sync scripts also pass --s3-no-check-bucket; this makes ad-hoc rclone safe too.
no_check_bucket = true
